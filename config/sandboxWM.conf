# sandboxWM — пример конфига
#
# Куда положить (первый найденный читается при старте):
#   $SANDBOXWM_CONFIG
#   $XDG_CONFIG_HOME/sandboxWM/config.toml
#   ~/.config/sandboxWM/config.toml
#   ./config/sandboxWM.toml   ← этот файл, если запускать из корня репо
#
# Любое поле можно опустить — подставится default из кода.
#
# Секции ниже разбиты на две группы:
#   1) Уже работают в коде: [physics], [controls].
#   2) Заготовки под концепт (sandboxWM_concept.md) — поля есть и читаются
#      из TOML, но ни одно из них пока не влияет на поведение композитора —
#      это заготовка на будущую реализацию.

# ── Физика (реализовано) ──────────────────────────────────────────
[physics]
# Шаг симуляции, секунды (1/60)
physics_dt = 0.016666668
gravity_y = 1500.0
floor_y = 2000.0
floor_half_w = 50000.0
floor_half_h = 100.0
density = 0.002
linear_damping = 1.5
angular_damping = 3.5
friction = 0.85
restitution = 0.2
max_drag_speed = 4000.0
spin_rate = 2.0
camera_step = 120.0
camera_lerp = 0.15

# ── Управление (реализовано) ───────────────────────────────────────
# Имена клавиш: Return, Escape, Left/Right/Up/Down, a–z, F1–F12
# Модификатор действий — Super (Logo); VT: Ctrl+Alt+Fn (не в конфиге).
[controls]
terminal = "kitty"
spawn_terminal = "Return"
quit = ["q", "Escape"]
close_window = "w"
toggle_physics = "g"
spin_left = "a"
spin_right = "d"
camera_left = "Left"
camera_right = "Right"
camera_up = "Up"
camera_down = "Down"

# ══ Заготовки под концепт (пока ни на что не влияют) ═══════════════════

# Режимы гравитации из концепта §1 (режим 1 = physics.gravity_y выше).
# Сейчас есть только общий туглер тайлинг↔физика (Super+G).
[gravity_modes]
# Режим 2: длительность перехода в строгий тайлинг, сек
freeze_transition_secs = 0.35
# Режим 2: порог скорости "улёгшегося" тела перед заморозкой, px/s
freeze_settle_speed = 5.0
# Режим 4: гравитация во время полной невесомости
weightless_gravity_y = 0.0

# Клавиши для функций, которых пока нет в коде.
[planned_controls]
gravity_freeze = "2"
gravity_float_window = "3"
gravity_zero = "4"
draw_line = "p"
slice_window = "x"
weld_windows = "e"
spring_windows = "s"
rope_windows = "r"

# Рисование физических линий курсором (концепт §2)
[drawing]
min_point_spacing = 8.0
default_thickness = 12.0
max_points = 512
preview_color = "#ffffff"

# Материалы линий: сталь / клей / батут / верёвка
[materials.steel]
friction = 0.8
restitution = 0.05
thickness = 12.0
color = "#8a8f98"

[materials.glue]
friction = 5.0
restitution = 0.0
thickness = 10.0
color = "#c9a227"
detach_force = 2000.0

[materials.trampoline]
friction = 0.3
restitution = 1.4
thickness = 10.0
color = "#3aa1ff"

[materials.rope]
segment_length = 20.0
segment_count = 16
thickness = 6.0
color = "#7a5230"
joint_stiffness = 1.0

# Скрепление окон: сварка / пружина / верёвка (концепт §4)
[joints.weld]
break_force = 0.0

[joints.spring]
stiffness = 200.0
damping = 10.0
rest_length = 150.0

[joints.rope]
segment_length = 20.0
max_length = 600.0
collides_with_linked_windows = false

# Мягкие тела / деформация (концепт §5–6)
[soft_body]
softness = 0.0
impact_squash = 0.0
mesh_resolution = 8
text_reprojection = false

# Разрезание окон (концепт §7)
[slicing]
min_piece_size = 80.0
cut_gap = 4.0

# Персистентность сессии (концепт §3)
[session]
enabled = false
autosave = false
autosave_interval_secs = 60
save_path = ""
format = "toml"

# Per-window свойства (вес, мягкость, …)
[window_props]
default_weight = 1.0
default_softness = 0.0
allow_overrides = true

# Будущий рендер-бэкенд (сейчас GLES; план — wgpu/glow для деформации окон)
[rendering]
backend = "gles"
vsync = true
