# sandboxWM — режимы гравитации + клавиши будущих функций (заготовка)
#
# Ничего в этом файле пока не влияет на поведение композитора — секции
# читаются в структуру конфига, но код их не использует (см. src/config.rs).

# Режимы гравитации из концепта §1 (режим 1 = physics.gravity_y, уже работает).
# Здесь — параметры режимов 2–4 (заморозка в тайлинг, невесомость окна/всех).
[gravity_modes]
freeze_transition_secs = 0.35
freeze_settle_speed = 5.0
weightless_gravity_y = 0.0

# Клавиши для функций, которых пока нет в input.rs.
[planned_controls]
gravity_freeze = "2"
gravity_float_window = "3"
gravity_zero = "4"
draw_line = "p"
slice_window = "x"
weld_windows = "e"
spring_windows = "s"
rope_windows = "r"
